<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobayas Studio</title>
    <link rel="icon" type="image/png" href="./logo1.png">
    <style>
        @font-face {
            font-family: 'CobayasFont';
            src: url('./CobayasFont-Regular.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #222222;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #interactive-btn {
            font-family: 'CobayasFont', sans-serif;
            color: #F9f4da; /* CAMBIO: Color Crema */
            text-decoration: none;
            font-size: 130px; 
            
            /* ESTADO INICIAL */
            letter-spacing: 2px; 
            
            /* Animación suave para el espaciado y el brillo */
            transition: letter-spacing 0.5s ease, text-shadow 0.3s ease; 
            
            user-select: none;
            text-align: center;
            white-space: nowrap; 
        }

        #interactive-btn:hover {
            /* ESTADO EXPANDIDO */
            letter-spacing: 20px; 
            text-shadow: 0 0 15px rgba(249, 244, 218, 0.5); /* CAMBIO: Brillo crema al hacer hover */
        }

        /* --- ANIMACIÓN DE ENTRADA SUAVE --- */
        body {
            animation: aparecer 0.8s ease-out;
        }

        @keyframes aparecer {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <a href="Home.html" id="interactive-btn">
        COBAYAS
    </a>

</body>
</html>
